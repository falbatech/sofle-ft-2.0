CONFIG_ZMK_KEYBOARD_NAME="Sofle FT"

# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_TRANSPORT_BLE=y

# BLE
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PERIPHERAL=y

# RGB
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT=y
CONFIG_ZMK_RGB_UNDERGLOW_LED_COUNT=72
CONFIG_ZMK_RGB_UNDERGLOW_BRIGHTNESS=30
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# OLED
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN=y

# Encoder
CONFIG_ZMK_ENCODER=y

# Power saving
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=60000
